<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FF6B6B">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%23FF6B6B'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='100'%3E%F0%9F%97%BA%EF%B8%8F%3C/text%3E%3C/svg%3E">
<title>ふたりマップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ac:#FF6B6B;--red:#E74C3C;--blue:#3498DB;--bg:#fff;--card:#fff;--text:#1a1a1a;--sub:#666;--border:#eee;--nav-bg:#fff;--input-bg:#f5f5f5;--shadow:0 1px 3px rgba(60,64,67,.12);--safe-b:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
body.dark{--bg:#1a1a1a;--card:#2a2a2a;--text:#f0f0f0;--sub:#aaa;--border:#333;--nav-bg:#222;--input-bg:#333;--shadow:0 1px 3px rgba(0,0,0,.3)}

.hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));background:var(--card);border-bottom:1px solid var(--border);z-index:100;flex-shrink:0}
.hd h1{font-size:18px;font-weight:700;color:var(--text)}
.hd .badge{font-size:11px;padding:4px 10px;border-radius:20px;transition:background .3s,color .3s}
.hd .badge.disconnected{background:var(--input-bg);color:var(--sub)}
.hd .badge.connected{background:#d4edda;color:#155724}
body.dark .hd .badge.connected{background:#1e4620;color:#a3d9a5}

.pn{display:none;flex:1;overflow-y:auto;overflow-x:hidden}
.pn.on{display:flex;flex-direction:column}

.bn{display:flex;background:var(--nav-bg);border-top:1px solid var(--border);padding:8px 0;padding-bottom:calc(8px + var(--safe-b));position:relative;z-index:100;flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border:none;background:none;color:var(--sub);font-size:10px;cursor:pointer;transition:.2s}
.nb i{font-size:20px}
.nb.on{color:var(--ac)}

.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px}
.cal-header h2{font-size:16px;font-weight:600}
.cal-header button{border:none;background:none;font-size:20px;color:var(--sub);cursor:pointer;padding:8px;line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 8px}
.cal-dow{text-align:center;font-size:11px;color:var(--sub);padding:4px 0;font-weight:500}
.cal-day{text-align:center;padding:10px 4px;border-radius:8px;font-size:14px;cursor:pointer;position:relative;transition:.15s}
.cal-day:active{background:var(--input-bg)}
.cal-day.selected{background:var(--ac);color:#fff}
.cal-day.has-visit::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--red)}
.cal-day.empty{pointer-events:none;color:transparent}
.day-log{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease}
.day-log.show{max-height:600px}
.log-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.log-card h4{font-size:14px;margin-bottom:4px}
.log-card p{font-size:12px;color:var(--sub);margin-bottom:8px;line-height:1.5}
.log-card .btn-map{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--blue);border:none;background:none;cursor:pointer;font-weight:600;padding:4px 0}

.map-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
#leaflet-map{width:100%;height:100%;z-index:1}
.map-search{position:absolute;top:12px;left:12px;right:12px;z-index:1000}
.map-search input{width:100%;padding:10px 14px 10px 36px;border:none;border-radius:24px;font-size:14px;background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,.15);font-family:inherit;color:var(--text)}
.map-search input:focus{outline:2px solid var(--ac)}
.map-search .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:14px}
.map-results{position:absolute;top:48px;left:0;right:0;background:var(--card);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.15);max-height:200px;overflow-y:auto;display:none}
.map-results.show{display:block}
.map-result-item{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);cursor:pointer}
.map-result-item:active{background:var(--input-bg)}
.map-legend{position:absolute;bottom:12px;left:12px;z-index:1000;background:var(--card);border-radius:8px;padding:6px 10px;font-size:11px;box-shadow:var(--shadow);display:flex;gap:10px}
.map-legend span{display:flex;align-items:center;gap:4px}
.map-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}

.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;align-items:flex-end;justify-content:center}
.so.open{display:flex}
.sheet{background:var(--card);border-radius:16px 16px 0 0;padding:16px;padding-bottom:calc(20px + var(--safe-b));width:100%;max-height:70vh;overflow-y:auto;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.shandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.sheet h3{font-size:16px;margin-bottom:12px}
.sheet .fg{margin-bottom:12px}
.sheet label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px}
.sheet input,.sheet textarea,.sheet select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--input-bg);font-family:inherit;color:var(--text)}
.sheet input:focus,.sheet textarea:focus,.sheet select:focus{outline:none;border-color:var(--ac)}
.sheet textarea{resize:vertical;min-height:60px}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;text-align:center}
.btn:active{opacity:.7}
.btn-primary{background:var(--ac);color:#fff}
.btn-secondary{background:var(--input-bg);color:var(--text);margin-top:6px}
.btn-danger{background:#fef0f0;color:var(--red);margin-top:6px}

.fab{position:fixed;bottom:calc(68px + var(--safe-b));right:16px;width:52px;height:52px;border-radius:50%;background:var(--ac);color:#fff;border:none;font-size:24px;box-shadow:0 3px 12px rgba(255,107,107,.4);cursor:pointer;z-index:500;display:flex;align-items:center;justify-content:center;transition:.2s;line-height:1}
.fab:active{transform:scale(.9)}

.settings{padding:16px}
.set-section{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.set-section h3{font-size:14px;margin-bottom:10px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.set-row label{font-size:13px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--border);border:none;cursor:pointer;position:relative;transition:.2s}
.toggle.on{background:var(--ac)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:23px}
.set-btn{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-size:13px;cursor:pointer;margin-top:6px;font-family:inherit;color:var(--text)}
.set-btn:active{background:var(--input-bg)}
.set-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:var(--input-bg);font-family:inherit;margin-bottom:6px;color:var(--text)}
.set-hint{font-size:10px;color:var(--sub);line-height:1.5;margin-top:6px}
.set-btn-row{display:flex;gap:6px;margin-top:6px}
.set-btn-row .set-btn{flex:1;margin-top:0}
.set-btn.btn-connect{border-color:#28a745;color:#28a745}
.set-btn.btn-connect:active{background:#d4edda}
.set-btn.btn-disconnect{border-color:var(--red);color:var(--red)}
.set-btn.btn-disconnect:active{background:#fef0f0}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:24px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

.marker-preview{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.marker-preview .pin-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.marker-preview h4{font-size:15px}
.marker-preview .sub{font-size:11px;color:var(--sub)}
.visit-list{margin-top:8px}
.visit-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.visit-item:last-child{border:none}
.visit-item .date{font-weight:600;color:var(--ac)}
.visit-item .memo{color:var(--sub);margin-top:2px}
.no-data{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px}

/* Leaflet custom marker */
.leaflet-marker-custom{width:28px;height:28px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;transition:.15s}
.leaflet-marker-custom:active{transform:scale(1.2)}
.leaflet-marker-custom.visited{background:#E74C3C}
.leaflet-marker-custom.wishlist{background:#3498DB}

/* Leaflet overrides for dark mode */
body.dark .leaflet-control-zoom a{background:var(--card);color:var(--text);border-color:var(--border)}
body.dark .leaflet-control-attribution{background:rgba(42,42,42,.8);color:var(--sub)}
body.dark .leaflet-control-attribution a{color:var(--sub)}

/* ============================================
   Loop 3: 写真機能 CSS
   ============================================ */

/* --- 写真追加ボタン --- */
.photo-add-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:12px 16px;margin:12px 0;background:#f0f4ff;border:2px dashed #a8c4ff;border-radius:12px;color:#4a7dff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s ease;-webkit-tap-highlight-color:transparent}
.photo-add-btn:hover{background:#e3ecff;border-color:#4a7dff}
.photo-add-btn:active{transform:scale(.97)}
.photo-add-btn:disabled{opacity:.5;cursor:not-allowed;border-color:#ccc;color:#999;background:#f5f5f5}
body.dark .photo-add-btn{background:#1e2a3a;border-color:#3a5a8a;color:#7ab3ff}
body.dark .photo-add-btn:hover{background:#253a52;border-color:#5a8abf}
body.dark .photo-add-btn:disabled{background:#2a2a2a;border-color:#444;color:#666}

/* --- 写真プレビュー（新規追加シート内） --- */
.photo-preview{display:none;flex-wrap:nowrap;gap:8px;overflow-x:auto;padding:8px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.photo-preview::-webkit-scrollbar{display:none}
.photo-preview-item{position:relative;flex-shrink:0;width:80px;height:80px;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.photo-preview-item img{width:100%;height:100%;object-fit:cover}
.photo-delete-btn{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:14px;line-height:20px;text-align:center;border:none;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
.photo-delete-btn:active{background:rgba(255,50,50,.8)}

/* --- カレンダーログ内: 横スクロール写真表示 --- */
.photo-scroll{display:flex;gap:8px;overflow-x:auto;padding:8px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.photo-scroll::-webkit-scrollbar{display:none}
.photo-scroll img{width:120px;height:90px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer;transition:transform .15s ease}
.photo-scroll img:active{transform:scale(.95)}

/* --- マーカーシート: 代表写真サムネイル --- */
.photo-thumbnail-wrap{position:relative;display:inline-block;margin:8px 0}
.photo-thumbnail{width:100%;max-width:200px;height:120px;object-fit:cover;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.photo-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.65);color:#fff;font-size:12px;font-weight:600;padding:2px 8px;border-radius:10px}

/* --- ライトボックス --- */
.photo-lightbox{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s ease;-webkit-backdrop-filter:blur(0px);backdrop-filter:blur(0px)}
.photo-lightbox.active{background:rgba(0,0,0,.85);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.photo-lightbox-content{position:relative;max-width:90vw;max-height:85vh}
.photo-lightbox-content img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px}
.photo-lightbox-close{position:absolute;top:-40px;right:0;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:22px;line-height:34px;text-align:center;border:none;cursor:pointer}
</style>
</head>
<body>

<header class="hd">
  <h1>&#x1F5FA;&#xFE0F; ふたりマップ</h1>
  <div class="badge disconnected" id="sync-badge">&#x26AA; 未接続</div>
</header>

<div class="pn on" id="p-calendar">
  <div class="cal-header">
    <button onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
    <h2 id="cal-title"></h2>
    <button onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="day-log" id="day-log"></div>
</div>

<div class="pn" id="p-map">
  <div class="map-wrap">
    <div class="map-search">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="map-input" placeholder="場所を検索..." autocomplete="off">
      <div class="map-results" id="map-results"></div>
    </div>
    <div id="leaflet-map"></div>
    <div class="map-legend">
      <span><span class="dot" style="background:var(--red)"></span> 行った</span>
      <span><span class="dot" style="background:var(--blue)"></span> 行きたい</span>
    </div>
  </div>
</div>

<div class="pn" id="p-settings">
  <div class="settings">
    <div class="set-section">
      <h3><i class="fa-solid fa-cloud"></i> Firebase接続</h3>
      <input class="set-input" id="fb-apikey" placeholder="apiKey">
      <input class="set-input" id="fb-dburl" placeholder="databaseURL（例: https://xxx.firebaseio.com）">
      <div class="set-btn-row">
        <button class="set-btn btn-connect" id="fb-connect-btn" onclick="fbConnect()"><i class="fa-solid fa-plug"></i> 接続</button>
        <button class="set-btn btn-disconnect" id="fb-disconnect-btn" onclick="fbDisconnect()" style="display:none"><i class="fa-solid fa-plug-circle-xmark"></i> 切断</button>
      </div>
      <p class="set-hint">&#x26A0;&#xFE0F; Firebaseコンソールでセキュリティルールを設定してください:<br><code style="font-size:10px">{"rules":{".read":"auth!=null",".write":"auth!=null"}}</code><br>テスト時は <code>true</code> でも可（公開注意）</p>
    </div>
    <div class="set-section">
      <h3><i class="fa-solid fa-key"></i> 共有キー（合言葉）</h3>
      <input class="set-input" id="fb-passphrase" placeholder="パートナーと同じ合言葉を入力">
      <button class="set-btn btn-connect" id="fb-share-btn" onclick="fbStartShare()"><i class="fa-solid fa-share-nodes"></i> 共有開始</button>
      <p class="set-hint">&#x1F4A1; 2人で同じ合言葉を入力すると、データがリアルタイム同期されます。合言葉はSHA-256でハッシュ化されルームIDとして使用されます。</p>
    </div>
    <div class="set-section">
      <h3><i class="fa-solid fa-palette"></i> 表示設定</h3>
      <div class="set-row">
        <label>ダークモード</label>
        <button class="toggle" id="dark-toggle" onclick="toggleDark()"></button>
      </div>
    </div>
    <div class="set-section">
      <h3><i class="fa-solid fa-floppy-disk"></i> データ管理</h3>
      <button class="set-btn" onclick="exportData()"><i class="fa-solid fa-download"></i> エクスポート（JSON）</button>
      <button class="set-btn" onclick="triggerImport()"><i class="fa-solid fa-upload"></i> インポート</button>
      <button class="set-btn" style="color:var(--red);border-color:var(--red)" onclick="clearData()"><i class="fa-solid fa-trash"></i> 全データ削除</button>
    </div>
  </div>
</div>

<nav class="bn">
  <button class="nb on" data-t="p-calendar">
    <i class="fa-solid fa-calendar-days"></i>
    <span>カレンダー</span>
  </button>
  <button class="nb" data-t="p-map">
    <i class="fa-solid fa-map-location-dot"></i>
    <span>地図</span>
  </button>
  <button class="nb" data-t="p-settings">
    <i class="fa-solid fa-gear"></i>
    <span>設定</span>
  </button>
</nav>

<button class="fab" id="fab" onclick="openAddSheet()"><i class="fa-solid fa-plus"></i></button>

<div class="so" id="sheet" onclick="sheetBgClick(event)">
  <div class="sheet"><div class="shandle"></div><div id="shB"></div></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-import" accept=".json" style="display:none">

<script>
(function(){
  "use strict";

  // === Service Worker Registration ===
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  }

  // === Storage wrapper ===
  var LS = {
    get: function(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
    set: function(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
    rm: function(k){ try{ localStorage.removeItem(k); }catch(e){} }
  };

  // === Data ===
  var KEY = "fm_data";
  var SAMPLE = {
    places:[
      {id:"p1",name:"\u4ee3\u3005\u6728\u516c\u5712",lat:35.6712,lng:139.6950,status:"visited",url:"",createdAt:"2025-07-05"},
      {id:"p2",name:"\u6771\u4eac\u30b9\u30ab\u30a4\u30c4\u30ea\u30fc",lat:35.7101,lng:139.8107,status:"visited",url:"",createdAt:"2025-07-12"},
      {id:"p3",name:"\u304a\u53f0\u5834\u6d77\u6d5c\u516c\u5712",lat:35.6295,lng:139.7753,status:"visited",url:"",createdAt:"2025-07-19"},
      {id:"p4",name:"\u938c\u5009 \u9db4\u5ca1\u516b\u5e61\u5bae",lat:35.3192,lng:139.5466,status:"wishlist",url:"https://www.hachimangu.or.jp/",createdAt:"2025-07-01"},
      {id:"p5",name:"\u6a2a\u6d5c\u4e2d\u83ef\u8857",lat:35.4437,lng:139.6450,status:"wishlist",url:"https://www.chinatown.or.jp/",createdAt:"2025-07-03"}
    ],
    visits:[
      {id:"v1",placeId:"p1",date:"2025-07-05",memo:"\u7dd1\u304c\u304d\u308c\u3044\u3060\u3063\u305f\uff01\u30d4\u30af\u30cb\u30c3\u30af\u6700\u9ad8",photos:[],createdAt:"2025-07-05"},
      {id:"v2",placeId:"p2",date:"2025-07-12",memo:"\u5c55\u671b\u53f0\u304b\u3089\u306e\u591c\u666f\u304c\u7d20\u6674\u3089\u3057\u3044",photos:[],createdAt:"2025-07-12"},
      {id:"v3",placeId:"p3",date:"2025-07-19",memo:"\u7802\u6d5c\u3067\u5915\u65e5\u3092\u898b\u305f\u3002\u98a8\u304c\u6c17\u6301\u3061\u3044\u3044",photos:[],createdAt:"2025-07-19"},
      {id:"v4",placeId:"p1",date:"2025-07-26",memo:"2\u56de\u76ee\uff01\u4eca\u5ea6\u306f\u30d0\u30c9\u30df\u30f3\u30c8\u30f3\u3057\u305f",photos:[],createdAt:"2025-07-26"}
    ]
  };

  function loadData(){
    var raw = LS.get(KEY);
    if(raw){ try{ return JSON.parse(raw); }catch(e){} }
    LS.set(KEY, JSON.stringify(SAMPLE));
    return JSON.parse(JSON.stringify(SAMPLE));
  }
  function saveData(){
    LS.set(KEY, JSON.stringify(data));
    fbSync();
  }
  var data = loadData();

  // === Firebase State ===
  var fbApp = null;
  var fbDB = null;
  var fbConnected = false;
  var fbRoomId = null;
  var fbListener = null;
  var fbConnInfoListener = null;
  var fbSyncPaused = false;

  // === Firebase: SHA-256 hash ===
  function sha256(str){
    var buf = new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256', buf).then(function(hash){
      var arr = Array.from(new Uint8Array(hash));
      return arr.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    });
  }

  // === Firebase: Update badge ===
  function updateBadge(connected){
    var badge = document.getElementById('sync-badge');
    if(connected){
      badge.textContent = '\ud83d\udfe2 \u540c\u671f\u4e2d';
      badge.className = 'badge connected';
    } else {
      badge.textContent = '\u26aa \u672a\u63a5\u7d9a';
      badge.className = 'badge disconnected';
    }
  }

  // === Firebase: Connect ===
  window.fbConnect = function(){
    var apiKey = document.getElementById('fb-apikey').value.trim();
    var dbUrl = document.getElementById('fb-dburl').value.trim();
    if(!apiKey || !dbUrl){
      toast('apiKey\u3068databaseURL\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044');
      return;
    }
    try {
      if(fbApp){
        try{ fbApp.delete(); }catch(e){}
        fbApp = null;
        fbDB = null;
      }
      var config = { apiKey: apiKey, databaseURL: dbUrl };
      fbApp = firebase.initializeApp(config);
      fbDB = firebase.database();
      fbConnected = true;
      LS.set('fm_fb_apikey', apiKey);
      LS.set('fm_fb_dburl', dbUrl);
      document.getElementById('fb-connect-btn').style.display = 'none';
      document.getElementById('fb-disconnect-btn').style.display = '';
      fbConnInfoListener = fbDB.ref('.info/connected').on('value', function(snap){
        if(snap.val() === true){
          updateBadge(true);
        } else {
          if(fbConnected) updateBadge(false);
        }
      });
      toast('Firebase\u63a5\u7d9a\u5b8c\u4e86\uff01');
      var pass = document.getElementById('fb-passphrase').value.trim();
      if(!pass){
        var savedPass = LS.get('fm_fb_pass');
        if(savedPass){
          document.getElementById('fb-passphrase').value = savedPass;
          pass = savedPass;
        }
      }
      if(pass){
        fbStartShareInternal(pass);
      } else {
        updateBadge(true);
      }
    } catch(e){
      toast('\u63a5\u7d9a\u306b\u5931\u6557\u3057\u307e\u3057\u305f: ' + (e.message || e));
      fbConnected = false;
      updateBadge(false);
    }
  };

  // === Firebase: Disconnect ===
  window.fbDisconnect = function(){
    fbStopListening();
    if(fbApp){
      try{ fbApp.delete(); }catch(e){}
      fbApp = null;
      fbDB = null;
    }
    fbConnected = false;
    fbRoomId = null;
    LS.rm('fm_fb_apikey');
    LS.rm('fm_fb_dburl');
    LS.rm('fm_fb_pass');
    document.getElementById('fb-connect-btn').style.display = '';
    document.getElementById('fb-disconnect-btn').style.display = 'none';
    updateBadge(false);
    toast('Firebase\u5207\u65ad\u3057\u307e\u3057\u305f\uff08\u30ed\u30fc\u30ab\u30eb\u30e2\u30fc\u30c9\uff09');
  };

  // === Firebase: Start Share (合言葉) ===
  window.fbStartShare = function(){
    var pass = document.getElementById('fb-passphrase').value.trim();
    if(!pass){
      toast('\u5408\u8a00\u8449\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044');
      return;
    }
    if(!fbConnected || !fbDB){
      toast('\u5148\u306bFirebase\u306b\u63a5\u7d9a\u3057\u3066\u304f\u3060\u3055\u3044');
      return;
    }
    fbStartShareInternal(pass);
  };

  function fbStartShareInternal(pass){
    LS.set('fm_fb_pass', pass);
    sha256(pass).then(function(hash){
      fbRoomId = hash;
      fbStopListening();
      fbListen();
      fbSync();
      toast('\u5171\u6709\u958b\u59cb\uff01 \u30eb\u30fc\u30e0\u306b\u63a5\u7d9a\u3057\u307e\u3057\u305f');
    }).catch(function(e){
      toast('\u30cf\u30c3\u30b7\u30e5\u751f\u6210\u306b\u5931\u6557\u3057\u307e\u3057\u305f');
    });
  }

  // === Firebase: Sync (write) ===
  function fbSync(){
    if(!fbConnected || !fbRoomId || !fbDB || fbSyncPaused) return;
    try {
      fbDB.ref(fbRoomId).set({
        places: data.places,
        visits: data.visits,
        updatedAt: Date.now()
      });
    } catch(e){}
  }

  // === Firebase: Listen (read) ===
  function fbListen(){
    if(!fbConnected || !fbRoomId || !fbDB) return;
    fbListener = fbDB.ref(fbRoomId).on('value', function(snap){
      var val = snap.val();
      if(val && val.places){
        var remote = JSON.stringify({places:val.places, visits:val.visits||[]});
        var local = JSON.stringify({places:data.places, visits:data.visits});
        if(remote !== local){
          fbSyncPaused = true;
          data.places = val.places;
          data.visits = val.visits || [];
          LS.set(KEY, JSON.stringify(data));
          renderCalendar();
          if(mapInitialized) renderPins();
          fbSyncPaused = false;
        }
      }
    });
  }

  // === Firebase: Stop listening ===
  function fbStopListening(){
    if(fbListener && fbDB && fbRoomId){
      fbDB.ref(fbRoomId).off('value', fbListener);
      fbListener = null;
    }
    if(fbConnInfoListener && fbDB){
      fbDB.ref('.info/connected').off('value', fbConnInfoListener);
      fbConnInfoListener = null;
    }
  }

  // === Firebase: Auto-reconnect on visibility change ===
  function fbAutoReconnect(){
    if(!fbConnected || !fbRoomId || !fbDB) return;
    fbStopListening();
    fbDB.ref('.info/connected').on('value', function(snap){
      if(snap.val() === true){
        updateBadge(true);
      } else {
        if(fbConnected) updateBadge(false);
      }
    });
    fbListen();
  }

  document.addEventListener('visibilitychange', function(){
    if(!document.hidden) fbAutoReconnect();
  });
  window.addEventListener('pageshow', function(){ fbAutoReconnect(); });
  window.addEventListener('focus', function(){ fbAutoReconnect(); });

  // === Firebase: Restore saved settings on load ===
  function fbRestoreSettings(){
    var apiKey = LS.get('fm_fb_apikey');
    var dbUrl = LS.get('fm_fb_dburl');
    var pass = LS.get('fm_fb_pass');
    if(apiKey) document.getElementById('fb-apikey').value = apiKey;
    if(dbUrl) document.getElementById('fb-dburl').value = dbUrl;
    if(pass) document.getElementById('fb-passphrase').value = pass;
    if(apiKey && dbUrl){
      setTimeout(function(){ fbConnect(); }, 500);
    }
  }

  // === Toast ===
  var toastTimer = null;
  window.toast = function(msg){
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove("show"); }, 2000);
  };

  // === Sheet ===
  window.openS = function(html){
    document.getElementById("shB").innerHTML = html;
    document.getElementById("sheet").classList.add("open");
  };
  window.closeS = function(){
    document.getElementById("sheet").classList.remove("open");

  window.sheetBgClick = function(e){

  // === Tabs ===
  var tabs = document.querySelectorAll(".nb");
  var panels = document.querySelectorAll(".pn");
  for(var i=0; i<tabs.length; i++){
    (function(btn){
      btn.addEventListener("click", function(){
        for(var j=0; j<tabs.length; j++) tabs[j].classList.remove("on");
        for(var j=0; j<panels.length; j++) panels[j].classList.remove("on");
        btn.classList.add("on");

        var fab = document.getElementById("fab");
        fab.style.display = btn.getAttribute("data-t")==="p-settings" ? "none" : "flex";

  // === Calendar ===
  var calYear = 2025, calMonth = 6;

  window.changeMonth = function(d){
    calMonth += d;
    if(calMonth < 0){ calMonth = 11; calYear--; }
    if(calMonth > 11){ calMonth = 0; calYear++; }
    renderCalendar();
  };

  function renderCalendar(){
    document.getElementById("cal-title").textContent = calYear + "\u5e74" + (calMonth+1) + "\u6708";
    var grid = document.getElementById("cal-grid");
    var dows = ["\u65e5","\u6708","\u706b","\u6c34","\u6728","\u91d1","\u571f"];
    var html = "";
    for(var i=0;i<7;i++) html += '<div class="cal-dow">'+dows[i]+"</div>";

    var first = new Date(calYear, calMonth, 1).getDay();
    var days = new Date(calYear, calMonth+1, 0).getDate();

    var visitDays = {};
    for(var i=0;i<data.visits.length;i++){
      var vd = new Date(data.visits[i].date);
      if(vd.getFullYear()===calYear && vd.getMonth()===calMonth){
        visitDays[vd.getDate()] = true;
      }
    }

    for(var i=0;i<first;i++) html += '<div class="cal-day empty">.</div>';
    for(var d=1;d<=days;d++){
      var cls = "cal-day";
      if(visitDays[d]) cls += " has-visit";
      html += '<div class="'+cls+'" data-day="'+d+'">'+d+"</div>";
    }
    grid.innerHTML = html;

    var dayCells = grid.querySelectorAll(".cal-day:not(.empty)");
    for(var i=0;i<dayCells.length;i++){
      (function(cell){
        cell.addEventListener("click", function(){
          showDayLog(parseInt(cell.getAttribute("data-day")));
        });
      })(dayCells[i]);
    }
    document.getElementById("day-log").classList.remove("show");
    document.getElementById("day-log").innerHTML = "";
  }

  function showDayLog(day){
    var cells = document.querySelectorAll(".cal-day");
    for(var i=0;i<cells.length;i++) cells[i].classList.remove("selected");
    var target = document.querySelector('.cal-day[data-day="'+day+'"]');
    if(target) target.classList.add("selected");

    var mm = String(calMonth+1).padStart(2,"0");
    var dd = String(day).padStart(2,"0");
    var dateStr = calYear + "-" + mm + "-" + dd;

    var dayVisits = [];
    for(var i=0;i<data.visits.length;i++){
      if(data.visits[i].date === dateStr) dayVisits.push(data.visits[i]);
    }

    var logEl = document.getElementById("day-log");
    if(dayVisits.length === 0){
      logEl.innerHTML = '<div class="no-data">\u3053\u306e\u65e5\u306e\u8a18\u9332\u306f\u3042\u308a\u307e\u305b\u3093</div>';
    } else {
      var h = "";
      for(var i=0;i<dayVisits.length;i++){
        var v = dayVisits[i];
        var place = findPlace(v.placeId);
        var pname = place ? place.name : "\u4e0d\u660e\u306a\u5834\u6240";
        h += '<div class="log-card"><h4><i class="fa-solid fa-location-dot"></i> '+pname+'</h4>';
        if(v.memo) h += '<p>'+v.memo+'</p>';
        // Loop 3: 写真横スクロール表示
        h += renderPhotoScrollHTML(v.photos, v.id);
        h += '<button class="btn-map" onclick="goToMap(\''+v.placeId+'\')"><i class="fa-solid fa-map"></i> \u5730\u56f3\u3067\u898b\u308b</button></div>';
      }
      logEl.innerHTML = h;
    }
    logEl.classList.remove("show");
    setTimeout(function(){ logEl.classList.add("show"); }, 20);
  }

  function findPlace(id){
    for(var i=0;i<data.places.length;i++){
      if(data.places[i].id===id) return data.places[i];
    }
    return null;
  }

  window.goToMap = function(placeId){
    for(var j=0; j<tabs.length; j++) tabs[j].classList.remove("on");
    for(var j=0; j<panels.length; j++) panels[j].classList.remove("on");
    tabs[1].classList.add("on");
    document.getElementById("p-map").classList.add("on");
    initMap();
    setTimeout(function(){
      var place = findPlace(placeId);
      if(place && map){
        map.flyTo([place.lat, place.lng], 15, {duration: 0.8});
        if(markers[placeId]){
          var el = markers[placeId].getElement();
          if(el){
            el.style.transform += ' scale(1.4)';
            setTimeout(function(){ el.style.transform = el.style.transform.replace(' scale(1.4)',''); }, 600);
          }
        }
      }
    }, 200);
  };

  // === Leaflet Map ===
  var map = null;
  var markers = {};
  var mapInitialized = false;

  function initMap(){
    if(mapInitialized){
      renderPins();
      setTimeout(function(){ if(map) map.invalidateSize(); }, 100);
      return;
    }
    mapInitialized = true;

    map = L.map('leaflet-map', {
      center: [35.6812, 139.7671],
      zoom: 11,
      zoomControl: false
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
      maxZoom: 19
    }).addTo(map);

    setTimeout(function(){ map.invalidateSize(); }, 100);
    renderPins();
  }

  function renderPins(){
    if(!map) return;
    for(var key in markers){
      if(markers.hasOwnProperty(key)){
        map.removeLayer(markers[key]);
      }
    }
    markers = {};

    for(var i=0;i<data.places.length;i++){
      var p = data.places[i];
      var icon = L.divIcon({
        className: 'leaflet-marker-custom ' + p.status,
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        popupAnchor: [0, -18]
      });

      var marker = L.marker([p.lat, p.lng], { icon: icon }).addTo(map);
      marker.bindTooltip(p.name, {
        direction: 'top',
        offset: [0, -16],
        className: ''
      });

      (function(place, m){
        m.on('click', function(){ showPinSheet(place); });
      })(p, marker);

      markers[p.id] = marker;
    }
  }

  function showPinSheet(place){
    var color = place.status==="visited" ? "var(--red)" : "var(--blue)";
    var stxt = place.status==="visited" ? "\u884c\u3063\u305f\u5834\u6240" : "\u884c\u304d\u305f\u3044\u5834\u6240";
    var h = '<div class="marker-preview"><div class="pin-dot" style="background:'+color+'"></div><div><h4>'+place.name+'</h4><div class="sub">'+stxt+'</div></div></div>';

    if(place.url){
      h += '<a href="'+place.url+'" target="_blank" rel="noopener" style="font-size:12px;color:var(--blue);display:block;margin:8px 0"><i class="fa-solid fa-link"></i> Web\u30b5\u30a4\u30c8\u3092\u958b\u304f</a>';
    }

    // Loop 3: 代表写真サムネイル表示
    var placeVisits = [];
    for(var i=0;i<data.visits.length;i++){
      if(data.visits[i].placeId===place.id) placeVisits.push(data.visits[i]);
    }
    var representativePhotos = null;
    for(var i=placeVisits.length-1;i>=0;i--){
      if(placeVisits[i].photos && placeVisits[i].photos.length > 0){
        representativePhotos = placeVisits[i].photos;
        break;
      }
    }
    if(representativePhotos){
      h += renderThumbnailHTML(representativePhotos);
    }

    if(placeVisits.length>0){
      h += '<div class="visit-list">';
      for(var i=0;i<placeVisits.length;i++){
        h += '<div class="visit-item"><span class="date">'+placeVisits[i].date+'</span><div class="memo">'+placeVisits[i].memo+'</div></div>';
      }
      h += '</div>';
    }

    if(place.status==="wishlist"){
      h += '<button class="btn btn-primary" onclick="markVisited(\''+place.id+'\')"><i class="fa-solid fa-check"></i> \u884c\u3063\u305f\u8a18\u9332\u306b\u5909\u3048\u308b</button>';
    }
    h += '<button class="btn btn-secondary" onclick="closeS()">\u9589\u3058\u308b</button>';
    openS(h);
  }

  window.markVisited = function(placeId){
    var place = findPlace(placeId);
    if(!place) return;
    // Loop 3: 写真追加UIを含むシートを表示
    var today = new Date().toISOString().split("T")[0];

    h += '<div class="marker-preview"><div class="pin-dot" style="background:var(--red)"></div><div><h4>'+place.name+'</h4><div class="sub">\u2192 \u884c\u3063\u305f\u5834\u6240\u306b\u5909\u66f4\u3057\u307e\u3059</div></div></div>';

    h += '<div class="fg"><label>\u4e00\u8a00\u30e1\u30e2</label><textarea id="mv-memo" placeholder="\u611f\u60f3\u3092\u66f8\u3053\u3046"></textarea></div>';
    // 写真追加セクション
    h += '<div class="fg"><button type="button" id="photo-add-btn" class="photo-add-btn" onclick="photoTrigger()">\ud83d\udcf7 \u5199\u771f\u3092\u8ffd\u52a0</button>';
    h += '<input type="file" id="photo-file-input" accept="image/*" multiple style="display:none">';
    h += '<div id="photo-preview-container" class="photo-preview"></div></div>';
    h += '<button class="btn btn-primary" onclick="confirmMarkVisited(\''+placeId+'\')"><i class="fa-solid fa-check"></i> \u4fdd\u5b58\u3059\u308b</button>';

  // === Search ===
  var searchResults = [];

  document.getElementById("map-input").addEventListener("keydown", function(e){
    if(e.key==="Enter") searchPlace();
  });

  document.addEventListener("click", function(e){

  function searchPlace(){
    var q = document.getElementById("map-input").value.trim();
    if(!q) return;
    var el = document.getElementById("map-results");
    el.innerHTML = '<div class="map-result-item"><i class="fa-solid fa-spinner fa-spin"></i> \u691c\u7d22\u4e2d...</div>';
    el.classList.add("show");

    fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(q)+"&countrycodes=jp&limit=5")
      .then(function(r){ return r.json(); })
      .then(function(res){
        searchResults = res;
        if(res.length===0){
          el.innerHTML = '<div class="map-result-item">\u898b\u3064\u304b\u308a\u307e\u305b\u3093\u3067\u3057\u305f</div>';
          return;
        }
        var h = "";
        for(var i=0;i<res.length;i++){
          var label = res[i].display_name.split(",").slice(0,3).join(", ");
          h += '<div class="map-result-item" onclick="addFromSearch('+i+')">'+label+'</div>';
        }
        el.innerHTML = h;
      })
      .catch(function(){
        el.innerHTML = '<div class="map-result-item">\u691c\u7d22\u30a8\u30e9\u30fc\uff08\u30cd\u30c3\u30c8\u30ef\u30fc\u30af\u78ba\u8a8d\uff09</div>';
      });
  }

  window.addFromSearch = function(idx){
    var r = searchResults[idx];
    if(!r) return;
    var name = r.display_name.split(",")[0];
    var lat = parseFloat(r.lat);
    var lng = parseFloat(r.lon);
    var np = {
      id:"p"+Date.now(),
      name:name,
      lat:lat,
      lng:lng,
      status:"wishlist",
      url:"",
      createdAt:new Date().toISOString().split("T")[0]
    };
    data.places.push(np);
    saveData();
    renderPins();
    document.getElementById("map-results").classList.remove("show");
    document.getElementById("map-input").value = "";
    if(map) map.flyTo([lat, lng], 14, {duration: 0.6});
    toast(name + " \u3092\u884c\u304d\u305f\u3044\u30ea\u30b9\u30c8\u306b\u8ffd\u52a0\uff01");
  };

  // === Add Sheet ===
  window.openAddSheet = function(){
    var today = new Date().toISOString().split("T")[0];
    var h = '<h3><i class="fa-solid fa-pen-to-square"></i> \u65b0\u3057\u3044\u8a18\u9332\u3092\u8ffd\u52a0</h3>';
    h += '<div class="fg"><label>\u5834\u6240\u306e\u540d\u524d *</label><input type="text" id="add-name" placeholder="\u4f8b\uff1a\u3007\u3007\u30ab\u30d5\u30a7"></div>';
    h += '<div class="fg"><label>\u65e5\u4ed8</label><input type="date" id="add-date" value="'+today+'"></div>';
    h += '<div class="fg"><label>\u4e00\u8a00\u30e1\u30e2</label><textarea id="add-memo" placeholder="\u4f8b\uff1a\u30d1\u30f3\u30b1\u30fc\u30ad\u304c\u7f8e\u5473\u3057\u304b\u3063\u305f\uff01"></textarea></div>';
    h += '<div class="fg"><label>\u30b9\u30c6\u30fc\u30bf\u30b9</label><select id="add-status"><option value="visited">\u884c\u3063\u305f\uff08\u8d64\u30d4\u30f3\uff09</option><option value="wishlist">\u884c\u304d\u305f\u3044\uff08\u9752\u30d4\u30f3\uff09</option></select></div>';
    h += '<div class="fg"><label>URL\uff08\u4efb\u610f\uff09</label><input type="url" id="add-url" placeholder="https://..."></div>';
    // Loop 3: 写真追加セクション
    h += '<div class="fg"><button type="button" id="photo-add-btn" class="photo-add-btn" onclick="photoTrigger()">\ud83d\udcf7 \u5199\u771f\u3092\u8ffd\u52a0</button>';
    h += '<input type="file" id="photo-file-input" accept="image/*" multiple style="display:none">';
    h += '<div id="photo-preview-container" class="photo-preview"></div></div>';
    h += '<button class="btn btn-primary" onclick="saveNewRecord()">\u4fdd\u5b58\u3059\u308b</button>';
    h += '<button class="btn btn-secondary" onclick="closeS()">\u30ad\u30e3\u30f3\u30bb\u30eb</button>';
    openS(h);
    photoReset();
    initPhotoInput();
  };

  window.saveNewRecord = function(){
    var name = document.getElementById("add-name").value.trim();
    var date = document.getElementById("add-date").value;
    var memo = document.getElementById("add-memo").value.trim();
    var status = document.getElementById("add-status").value;
    var url = document.getElementById("add-url").value.trim();

    if(!name){ toast("\u5834\u6240\u540d\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044"); return; }

    var lat = 35.5 + Math.random()*0.4;
    var lng = 139.5 + Math.random()*0.4;

    var pid = "p"+Date.now();
    data.places.push({id:pid,name:name,lat:lat,lng:lng,status:status,url:url,createdAt:date});

    if(status==="visited"){
      var photos = photoGetPhotos();
      data.visits.push({id:"v"+Date.now(),placeId:pid,date:date,memo:memo,photos:photos,createdAt:date});
    }
    saveData();
    renderCalendar();
    renderPins();
    closeS();
    toast(name + " \u3092\u4fdd\u5b58\u3057\u307e\u3057\u305f\uff01");
  };

  // === Settings ===
  window.toggleDark = function(){
    document.body.classList.toggle("dark");
    var isDark = document.body.classList.contains("dark");
    LS.set("fm_dark", isDark?"1":"0");
    document.getElementById("dark-toggle").classList.toggle("on", isDark);
  };

  window.exportData = function(){
    try{
      var blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "futari-map-backup.json";
      a.click();
      URL.revokeObjectURL(a.href);
      toast("\u30a8\u30af\u30b9\u30dd\u30fc\u30c8\u5b8c\u4e86");
    }catch(e){ toast("\u30a8\u30af\u30b9\u30dd\u30fc\u30c8\u306b\u5931\u6557\u3057\u307e\u3057\u305f"); }
  };

  window.triggerImport = function(){
    document.getElementById("file-import").click();
  };

  document.getElementById("file-import").addEventListener("change", function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var imported = JSON.parse(ev.target.result);
        if(imported.places && imported.visits){
          data = imported;
          saveData();
          renderCalendar();
          renderPins();
          toast("\u30a4\u30f3\u30dd\u30fc\u30c8\u5b8c\u4e86\uff01");
        } else {
          toast("\u7121\u52b9\u306a\u30c7\u30fc\u30bf\u5f62\u5f0f\u3067\u3059");
        }
      }catch(err){ toast("JSON\u306e\u89e3\u6790\u306b\u5931\u6557\u3057\u307e\u3057\u305f"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  window.clearData = function(){
    var h = '<h3><i class="fa-solid fa-triangle-exclamation"></i> \u5168\u30c7\u30fc\u30bf\u524a\u9664</h3>';
    h += '<p style="font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.5">\u5168\u3066\u306e\u30c7\u30fc\u30bf\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f<br>\u3053\u306e\u64cd\u4f5c\u306f\u5143\u306b\u623b\u305b\u307e\u305b\u3093\u3002</p>';
    if(fbConnected && fbRoomId){
      h += '<p style="font-size:12px;color:var(--red);margin-bottom:12px"><i class="fa-solid fa-cloud"></i> Firebase\u5074\u306e\u30c7\u30fc\u30bf\u3082\u524a\u9664\u3055\u308c\u307e\u3059</p>';
    }
    h += '<button class="btn btn-danger" onclick="confirmClear()">\u524a\u9664\u3059\u308b</button>';
    h += '<button class="btn btn-secondary" onclick="closeS()">\u30ad\u30e3\u30f3\u30bb\u30eb</button>';
    openS(h);
  };

  window.confirmClear = function(){
    data = {places:[],visits:[]};
    LS.set(KEY, JSON.stringify(data));
    if(fbConnected && fbRoomId && fbDB){
      try{ fbDB.ref(fbRoomId).remove(); }catch(e){}
    }
    renderCalendar();
    renderPins();
    closeS();
    toast("\u5168\u30c7\u30fc\u30bf\u3092\u524a\u9664\u3057\u307e\u3057\u305f");
  };

  // ============================================================
  // Loop 3: 写真機能（インライン統合版、var宣言のみ）
  // ============================================================
  var photoCurrentPhotos = [];
  var PHOTO_MAX = 5;
  var PHOTO_COMPRESS_OPTIONS = {
    maxSizeMB: 0.3,
    maxWidthOrHeight: 1200,
    useWebWorker: true,
    fileType: 'image/webp'
  };

  // 写真ファイル入力を初期化
  function initPhotoInput(){
    var fileInput = document.getElementById('photo-file-input');
    if(fileInput){
      fileInput.addEventListener('change', photoHandleFileSelect);
    }
  }

  // ファイル選択トリガー
  window.photoTrigger = function(){
    var fileInput = document.getElementById('photo-file-input');
    if(fileInput){
      fileInput.value = '';
      fileInput.click();
    }
  };

  // ファイル選択ハンドラー
  function photoHandleFileSelect(event){
    var files = Array.prototype.slice.call(event.target.files);
    if(!files.length) return;

    var remaining = PHOTO_MAX - photoCurrentPhotos.length;
    if(remaining <= 0){
      toast('\u5199\u771f\u306f\u6700\u5927' + PHOTO_MAX + '\u679a\u307e\u3067\u3067\u3059');
      return;
    }

    var filesToProcess = files.slice(0, remaining);
    if(files.length > remaining){
      toast('\u6b8b\u308a' + remaining + '\u679a\u307e\u3067\u8ffd\u52a0\u3067\u304d\u307e\u3059');
    }

    photoShowLoading(true);

    var processed = 0;
    var results = [];
    for(var i=0; i<filesToProcess.length; i++){
      (function(file, idx){
        photoCompressAndConvert(file).then(function(base64){
          results[idx] = base64;
          processed++;
          if(processed === filesToProcess.length){
            for(var j=0; j<results.length; j++){
              if(results[j]) photoCurrentPhotos.push(results[j]);
            }
            photoRenderPreview();
            photoShowLoading(false);
          }
        }).catch(function(){
          results[idx] = null;
          processed++;
          if(processed === filesToProcess.length){
            for(var j=0; j<results.length; j++){
              if(results[j]) photoCurrentPhotos.push(results[j]);
            }
            photoRenderPreview();
            photoShowLoading(false);
          }
        });
      })(filesToProcess[i], i);
    }
  }

  // 画像圧縮 & Base64変換
  function photoCompressAndConvert(file){
    return imageCompression(file, PHOTO_COMPRESS_OPTIONS).then(function(compressedBlob){
      return new Promise(function(resolve, reject){
        var reader = new FileReader();
        reader.onload = function(){ resolve(reader.result); };
        reader.onerror = function(){ reject(new Error('FileReader failed')); };
        reader.readAsDataURL(compressedBlob);
      });
    });
  }

  // プレビュー描画
  function photoRenderPreview(){
    var container = document.getElementById('photo-preview-container');
    if(!container) return;

    if(photoCurrentPhotos.length === 0){
      container.innerHTML = '';
      container.style.display = 'none';
      photoUpdateCount();
      return;
    }

    container.style.display = 'flex';
    var html = '';
    for(var i=0; i<photoCurrentPhotos.length; i++){
      html += '<div class="photo-preview-item" data-index="'+i+'">';
      html += '<img src="'+photoCurrentPhotos[i]+'" alt="\u5199\u771f'+(i+1)+'">';
      html += '<button type="button" class="photo-delete-btn" onclick="photoRemove('+i+')" aria-label="\u524a\u9664">\u00d7</button>';
      html += '</div>';
    }
    container.innerHTML = html;
    photoUpdateCount();
  }

  // 写真削除
  window.photoRemove = function(index){
    if(index >= 0 && index < photoCurrentPhotos.length){
      photoCurrentPhotos.splice(index, 1);
      photoRenderPreview();
      if(navigator.vibrate) navigator.vibrate(30);
    }
  };

  // 枚数カウンター更新
  function photoUpdateCount(){
    var btn = document.getElementById('photo-add-btn');
    if(!btn) return;
    if(photoCurrentPhotos.length >= PHOTO_MAX){
      btn.textContent = '\ud83d\udcf7 \u5199\u771f ' + photoCurrentPhotos.length + '/' + PHOTO_MAX + '\uff08\u4e0a\u9650\uff09';
      btn.disabled = true;
    } else {
      btn.textContent = photoCurrentPhotos.length > 0
        ? '\ud83d\udcf7 \u5199\u771f\u3092\u8ffd\u52a0\uff08' + photoCurrentPhotos.length + '/' + PHOTO_MAX + '\uff09'
        : '\ud83d\udcf7 \u5199\u771f\u3092\u8ffd\u52a0';
      btn.disabled = false;
    }
  }

  // ローディング表示
  function photoShowLoading(isLoading){
    var btn = document.getElementById('photo-add-btn');
    if(!btn) return;
    if(isLoading){
      btn.disabled = true;
      btn.textContent = '\u23f3 \u5727\u7e2e\u4e2d...';
    } else {
      btn.disabled = false;
      photoUpdateCount();
    }
  }

  // 写真データ取得
  function photoGetPhotos(){
    return photoCurrentPhotos.slice();
  }
  window.photoGetPhotos = photoGetPhotos;

  // リセット
  function photoReset(){
    photoCurrentPhotos = [];
  }
  window.photoReset = photoReset;

  // カレンダーログ用: 横スクロール写真HTML生成
  function renderPhotoScrollHTML(photos, visitId){
    if(!photos || photos.length === 0) return '';
    var html = '<div class="photo-scroll" data-visit-id="'+visitId+'">';
    for(var i=0; i<photos.length; i++){
      html += '<img src="'+photos[i]+'" alt="\u5199\u771f'+(i+1)+'" loading="lazy" data-visit="'+visitId+'" data-index="'+i+'" class="photo-scroll-img">';
    }
    html += '</div>';
    return html;
  }

  // マーカーシート用: 代表写真サムネイルHTML生成
  function renderThumbnailHTML(photos){
    if(!photos || photos.length === 0) return '';
    var badge = photos.length > 1 ? '<span class="photo-badge">+' + (photos.length - 1) + '</span>' : '';
    return '<div class="photo-thumbnail-wrap"><img src="'+photos[0]+'" alt="\u4ee3\u8868\u5199\u771f" class="photo-thumbnail">'+badge+'</div>';
  }

  // ライトボックス（イベント委譲）
  document.addEventListener('click', function(e){
    if(!e.target.classList.contains('photo-scroll-img')) return;
    var src = e.target.src;
    var overlay = document.createElement('div');
    overlay.className = 'photo-lightbox';
    overlay.innerHTML = '<div class="photo-lightbox-content"><img src="'+src+'" alt="\u62e1\u5927\u5199\u771f"><button class="photo-lightbox-close" aria-label="\u9589\u3058\u308b">\u00d7</button></div>';
    overlay.addEventListener('click', function(ev){
      if(ev.target === overlay || ev.target.classList.contains('photo-lightbox-close')){
        overlay.classList.remove('active');
        setTimeout(function(){ if(overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 200);
      }
    });
    document.body.appendChild(overlay);
    requestAnimationFrame(function(){ overlay.classList.add('active'); });
  });

  // 長押し削除（モバイル）
  (function(){
    var longPressTimer = null;
    document.addEventListener('touchstart', function(e){
      var item = e.target.closest ? e.target.closest('.photo-preview-item') : null;
      if(!item) return;
      longPressTimer = setTimeout(function(){
        var index = parseInt(item.getAttribute('data-index'), 10);
        if(confirm('\u3053\u306e\u5199\u771f\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f')){
          window.photoRemove(index);
        }
        if(navigator.vibrate) navigator.vibrate(50);
      }, 500);
    }, false);
    document.addEventListener('touchend', function(){
      if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer = null; }
    }, false);
    document.addEventListener('touchmove', function(){
      if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer = null; }
    }, false);
  })();

  // === Init ===
  if(LS.get("fm_dark")==="1"){
    document.body.classList.add("dark");
    document.getElementById("dark-toggle").classList.add("on");
  }
  renderCalendar();
  fbRestoreSettings();

})();
</script>
</body>
</html>
