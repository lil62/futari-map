<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FF6B6B">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%23FF6B6B'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='100'%3E%F0%9F%97%BA%EF%B8%8F%3C/text%3E%3C/svg%3E">
<title>ふたりマップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ac:#FF6B6B;--red:#E74C3C;--blue:#3498DB;--bg:#fff;--card:#fff;--text:#1a1a1a;--sub:#666;--border:#eee;--nav-bg:#fff;--input-bg:#f5f5f5;--shadow:0 1px 3px rgba(60,64,67,.12);--safe-b:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
body.dark{--bg:#1a1a1a;--card:#2a2a2a;--text:#f0f0f0;--sub:#aaa;--border:#333;--nav-bg:#222;--input-bg:#333;--shadow:0 1px 3px rgba(0,0,0,.3)}
input,textarea,select{font-size:16px !important}
.hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));background:var(--card);border-bottom:1px solid var(--border);z-index:100;flex-shrink:0}
.hd h1{font-size:18px;font-weight:700;color:var(--text)}
.hd .badge{font-size:11px;padding:4px 10px;border-radius:20px;transition:background .3s,color .3s}
.hd .badge.disconnected{background:var(--input-bg);color:var(--sub)}
.hd .badge.connected{background:#d4edda;color:#155724}
.refresh-btn{border:none;background:var(--input-bg);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.refresh-btn:active{transform:rotate(180deg)}
body.dark .hd .badge.connected{background:#1e4620;color:#a3d9a5}
.pn{display:none;flex:1;overflow-y:auto;overflow-x:hidden}
.pn.on{display:flex;flex-direction:column}
.bn{display:flex;background:var(--nav-bg);border-top:1px solid var(--border);padding:8px 0;padding-bottom:calc(8px + var(--safe-b));position:relative;z-index:100;flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border:none;background:none;color:var(--sub);font-size:10px;cursor:pointer;transition:.2s}
.nb i{font-size:20px}
.nb.on{color:var(--ac)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px}
.cal-header h2{font-size:16px;font-weight:600;cursor:pointer;position:relative}
.cal-header button{border:none;background:none;font-size:20px;color:var(--sub);cursor:pointer;padding:8px;line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 8px}
.cal-dow{text-align:center;font-size:11px;color:var(--sub);padding:4px 0;font-weight:500}
.cal-day{text-align:center;padding:10px 4px;border-radius:8px;font-size:14px;cursor:pointer;position:relative;transition:.15s}
.cal-day:active{background:var(--input-bg)}
.cal-day.selected{background:var(--ac);color:#fff}
.cal-day.has-visit::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--red)}
.cal-day.empty{pointer-events:none;color:transparent}
.day-log{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease}
.day-log.show{max-height:800px}
.log-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.log-card h4{font-size:14px;margin-bottom:4px}
.log-card p{font-size:12px;color:var(--sub);margin-bottom:8px;line-height:1.5}
.log-card .btn-map{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--blue);border:none;background:none;cursor:pointer;font-weight:600;padding:4px 0}
.log-card .btn-edit{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--ac);border:none;background:none;cursor:pointer;font-weight:600;padding:4px 0;margin-left:12px}
.map-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
#leaflet-map{width:100%;height:100%;z-index:1}
.map-search{position:absolute;top:12px;left:12px;right:12px;z-index:1000;display:flex;align-items:center;gap:0}
.map-search-wrap{flex:1;position:relative}
.map-search-wrap input{width:100%;padding:10px 14px 10px 36px;border:none;border-radius:24px 0 0 24px;font-size:16px;background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,.15);font-family:inherit;color:var(--text)}
.map-search-wrap input:focus{outline:2px solid var(--ac)}
.map-search-wrap .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:14px}
.map-search-btn{width:44px;height:42px;border:none;border-radius:0 24px 24px 0;background:var(--ac);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-shrink:0}
.map-search-btn:active{opacity:.7}
.map-results{position:absolute;top:48px;left:0;right:0;background:var(--card);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.15);max-height:320px;overflow-y:auto;display:none}
.map-results.show{display:block}
.map-result-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.map-result-item:active{background:var(--input-bg)}
.map-result-item .result-name{font-size:14px;font-weight:600;color:var(--text)}
.map-result-item .result-addr{font-size:11px;color:var(--sub);margin-top:2px;line-height:1.4}
.map-result-item.no-result{cursor:default;color:var(--sub);font-size:13px}
.map-result-item.no-result:active{background:none}
.map-result-section{padding:6px 14px 2px;font-size:11px;font-weight:700;color:var(--sub);background:var(--input-bg);border-bottom:1px solid var(--border)}
.map-result-item .result-category{font-size:11px;color:var(--sub);margin-top:1px}
.map-legend{position:absolute;bottom:12px;left:60px;z-index:1000;background:var(--card);border-radius:8px;padding:6px 10px;font-size:11px;box-shadow:var(--shadow);display:flex;gap:10px}
.map-legend span{display:flex;align-items:center;gap:4px}
.map-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.map-filter-chips{position:absolute;top:56px;left:0;right:0;z-index:999;display:flex;gap:6px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.map-filter-chips::-webkit-scrollbar{display:none}
.map-chip{flex-shrink:0;padding:5px 10px;border-radius:16px;font-size:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;white-space:nowrap;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.map-chip:active{transform:scale(.95)}
.map-chip.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.map-ctrl-btns{position:absolute;bottom:12px;right:56px;z-index:1000;display:flex;gap:6px}
.map-ctrl-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--card);box-shadow:0 2px 6px rgba(0,0,0,.15);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.map-ctrl-btn.active{background:var(--ac);color:#fff;transform:scale(1.1)}
body.dark .map-ctrl-btn{background:var(--card);color:var(--text)}
.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;align-items:flex-end;justify-content:center}
.so.open{display:flex}
.sheet{background:var(--card);border-radius:16px 16px 0 0;padding:16px;padding-bottom:calc(20px + var(--safe-b));width:100%;max-height:70vh;overflow-y:auto;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.shandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.sheet h3{font-size:16px;margin-bottom:12px}
.sheet .fg{margin-bottom:12px}
.sheet label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px}
.sheet input,.sheet textarea,.sheet select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;background:var(--input-bg);font-family:inherit;color:var(--text)}
.sheet input:focus,.sheet textarea:focus,.sheet select:focus{outline:none;border-color:var(--ac)}
.sheet textarea{resize:vertical;min-height:60px}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;text-align:center}
.btn:active{opacity:.7}
.btn-primary{background:var(--ac);color:#fff}
.btn-secondary{background:var(--input-bg);color:var(--text);margin-top:6px}
.btn-danger{background:#fef0f0;color:var(--red);margin-top:6px}
.fab{position:fixed;bottom:calc(68px + var(--safe-b));right:16px;width:52px;height:52px;border-radius:50%;background:var(--ac);color:#fff;border:none;font-size:24px;box-shadow:0 3px 12px rgba(255,107,107,.4);cursor:pointer;z-index:500;display:flex;align-items:center;justify-content:center;transition:.2s;line-height:1}
.fab:active{transform:scale(.9)}
.settings{padding:16px}
.set-section{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.set-section h3{font-size:14px;margin-bottom:10px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.set-row label{font-size:13px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--border);border:none;cursor:pointer;position:relative;transition:.2s}
.toggle.on{background:var(--ac)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:23px}
.set-btn{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-size:13px;cursor:pointer;margin-top:6px;font-family:inherit;color:var(--text)}
.set-btn:active{background:var(--input-bg)}
.set-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:16px;background:var(--input-bg);font-family:inherit;margin-bottom:6px;color:var(--text)}
.set-hint{font-size:10px;color:var(--sub);line-height:1.5;margin-top:6px}
.set-btn-row{display:flex;gap:6px;margin-top:6px}
.set-btn-row .set-btn{flex:1;margin-top:0}
.set-btn.btn-connect{border-color:#28a745;color:#28a745}
.set-btn.btn-connect:active{background:#d4edda}
.set-btn.btn-disconnect{border-color:var(--red);color:var(--red)}
.set-btn.btn-disconnect:active{background:#fef0f0}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:24px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.marker-preview{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.marker-preview .pin-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.marker-preview h4{font-size:15px}
.marker-preview .sub{font-size:11px;color:var(--sub)}
.visit-list{margin-top:8px}
.visit-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.visit-item:last-child{border:none}
.visit-item .date{font-weight:600;color:var(--ac)}
.visit-item .memo{color:var(--sub);margin-top:2px}
.visit-item .btn-edit{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--ac);border:none;background:none;cursor:pointer;font-weight:600;padding:4px 0;margin-top:4px}
.no-data{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px}
.leaflet-marker-custom{width:28px;height:28px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;transition:.15s}
.leaflet-marker-custom:active{transform:scale(1.2)}
.leaflet-marker-custom.visited{background:#E74C3C}
.leaflet-marker-custom.wishlist{background:#3498DB}
body.dark .leaflet-control-zoom a{background:var(--card);color:var(--text);border-color:var(--border)}
body.dark .leaflet-control-attribution{background:rgba(42,42,42,.8);color:var(--sub)}
body.dark .leaflet-control-attribution a{color:var(--sub)}
.photo-add-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:12px 16px;margin:12px 0;background:#f0f4ff;border:2px dashed #a8c4ff;border-radius:12px;color:#4a7dff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s ease;-webkit-tap-highlight-color:transparent}
.photo-add-btn:hover{background:#e3ecff;border-color:#4a7dff}
.photo-add-btn:active{transform:scale(.97)}
.photo-add-btn:disabled{opacity:.5;cursor:not-allowed;border-color:#ccc;color:#999;background:#f5f5f5}
body.dark .photo-add-btn{background:#1e2a3a;border-color:#3a5a8a;color:#7ab3ff}
body.dark .photo-add-btn:hover{background:#253a52;border-color:#5a8abf}
body.dark .photo-add-btn:disabled{background:#2a2a2a;border-color:#444;color:#666}
.photo-preview{display:none;flex-wrap:nowrap;gap:8px;overflow-x:auto;padding:8px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.photo-preview::-webkit-scrollbar{display:none}
.photo-preview-item{position:relative;flex-shrink:0;width:80px;height:80px;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.photo-preview-item img{width:100%;height:100%;object-fit:cover}
.photo-delete-btn{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:14px;line-height:20px;text-align:center;border:none;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
.photo-delete-btn:active{background:rgba(255,50,50,.8)}
.photo-scroll{display:flex;gap:8px;overflow-x:auto;padding:8px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.photo-scroll::-webkit-scrollbar{display:none}
.photo-scroll img{width:120px;height:90px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer;transition:transform .15s ease;scroll-snap-align:start}
.photo-scroll img:active{transform:scale(.95)}
.photo-thumbnail-wrap{position:relative;display:inline-block;margin:8px 0}
.photo-thumbnail{width:100%;max-width:200px;height:120px;object-fit:cover;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.12);cursor:pointer}
.photo-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.65);color:#fff;font-size:12px;font-weight:600;padding:2px 8px;border-radius:10px}
.photo-lightbox{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s ease;-webkit-backdrop-filter:blur(0px);backdrop-filter:blur(0px)}
.photo-lightbox.active{background:rgba(0,0,0,.85);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.photo-lightbox-content{position:relative;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;align-items:center}
.photo-lightbox-content img{max-width:90vw;max-height:75vh;object-fit:contain;border-radius:8px;user-select:none;-webkit-user-drag:none}
.photo-lightbox-close{position:absolute;top:-40px;right:0;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:22px;line-height:34px;text-align:center;border:none;cursor:pointer;z-index:10}
.photo-lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:18px;line-height:38px;text-align:center;border:none;cursor:pointer;z-index:10}
.photo-lightbox-nav:active{background:rgba(255,255,255,.4)}
.photo-lightbox-nav.prev{left:-50px}
.photo-lightbox-nav.next{right:-50px}
@media(max-width:500px){.photo-lightbox-nav.prev{left:8px}.photo-lightbox-nav.next{right:8px}}
.photo-lightbox-dots{display:flex;gap:6px;margin-top:12px;justify-content:center}
.photo-lightbox-dots .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .2s}
.photo-lightbox-dots .dot.active{background:#fff}
.cal-picker-overlay{display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);background:var(--card);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.2);padding:12px 16px;z-index:200;min-width:200px}
.cal-picker-overlay.show{display:block}
.cal-picker-row{display:flex;gap:8px;align-items:center;justify-content:center}
.cal-picker-row select{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;background:var(--input-bg);color:var(--text);font-family:inherit;appearance:auto;-webkit-appearance:auto}
.cal-title-wrap{position:relative;display:inline-block}
/* === 統計パネル === */
#p-stats{padding:16px}
.stats-section{margin-bottom:20px}
.stats-section-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stats-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stats-card{background:var(--card);border-radius:12px;padding:14px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.stats-card .sc-icon{font-size:24px;margin-bottom:4px}
.stats-card .sc-value{font-size:22px;font-weight:800;color:var(--ac)}
.stats-card .sc-label{font-size:11px;color:var(--sub);margin-top:2px}
.stats-bar-chart{display:flex;flex-direction:column;gap:4px}
.stats-bar-row{display:flex;align-items:center;gap:6px}
.stats-bar-label{font-size:10px;color:var(--sub);min-width:32px;text-align:right}
.stats-bar-track{flex:1;height:18px;background:var(--input-bg);border-radius:5px;overflow:hidden}
.stats-bar-fill{height:100%;background:linear-gradient(90deg,var(--ac),#ff9a9a);border-radius:5px;display:flex;align-items:center;padding-left:6px;transition:width .5s}
.stats-bar-count{font-size:9px;font-weight:700;color:#fff;white-space:nowrap}
.stats-pie-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.stats-pie{width:150px;height:150px;border-radius:50%;position:relative}
.stats-pie-hole{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:75px;height:75px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.stats-legend{display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center}
.stats-legend-item{display:flex;align-items:center;gap:4px;font-size:11px}
.stats-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stats-fav-list{display:flex;flex-direction:column;gap:6px}
.stats-fav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.stats-fav-rank{font-size:16px;font-weight:800;color:var(--ac);min-width:24px}
.stats-fav-info{flex:1}
.stats-fav-name{font-size:13px;font-weight:600}
.stats-fav-meta{font-size:11px;color:var(--sub);margin-top:2px}
.stats-fav-stars{color:#F5A623}
.stats-cost-total{font-size:22px;font-weight:800;color:var(--ac);margin-bottom:8px}
.stats-cost-row{display:flex;justify-content:space-between;padding:8px 10px;background:var(--card);border-radius:8px;border:1px solid var(--border);margin-bottom:4px;font-size:12px}
.stats-empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px}
/* === 思い出バナー === */
.memory-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;margin:8px 16px 0;background:linear-gradient(135deg,#fff3e0,#ffe0b2);border-radius:10px;font-size:13px;animation:bannerIn .3s ease}
body.dark .memory-banner{background:linear-gradient(135deg,#3a2e1a,#4a3520)}
@keyframes bannerIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.memory-banner-hide{opacity:0;transform:translateY(-10px);transition:.3s}
.memory-banner-text{flex:1}
.memory-banner-close{border:none;background:none;font-size:18px;color:var(--sub);cursor:pointer;padding:4px}
/* === ヒートマップ円 === */
.leaflet-heatcircle{pointer-events:none}
/* === ★評価UI === */
.star-rating-section{background:var(--input-bg);border-radius:10px;padding:12px 14px;margin-bottom:12px;text-align:center}
.star-rating-section label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.star-rating-stars{display:inline-flex;gap:4px}
.star-rating-stars span{font-size:30px;cursor:pointer;transition:transform .15s;user-select:none;-webkit-tap-highlight-color:transparent;line-height:1}
.star-rating-stars span:active{transform:scale(1.3)}
.star-rating-stars span.star-off{color:#999}
.star-rating-stars span.star-on{color:#FFD700}
/* === 費用入力 === */
.cost-input-group{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;background:var(--input-bg);overflow:hidden}
.cost-input-group:focus-within{border-color:var(--ac)}
.cost-input-prefix{padding:10px 8px 10px 12px;font-size:16px;font-weight:700;color:var(--sub);background:transparent;flex-shrink:0}
.cost-input-group input{border:none !important;background:transparent !important;padding:10px 12px 10px 0 !important;flex:1;min-width:0;border-radius:0 !important}
.cost-input-group input:focus{outline:none !important;border-color:transparent !important}
</style>

<body>

<header class="hd">
  <h1>&#x1F5FA;&#xFE0F; ふたりマップ</h1>
  <div style="display:flex;align-items:center;gap:6px"><div class="badge disconnected" id="sync-badge">&#x26AA; 未接続</div><button class="refresh-btn" onclick="manualRefresh()">&#x1F504;</button></div>
</header>

<div class="pn on" id="p-calendar">
  <div id="memory-banner-container"></div>
  <div class="cal-header">
    <button onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="cal-title-wrap">
      <h2 id="cal-title" onclick="toggleCalPicker()"></h2>
      <div class="cal-picker-overlay" id="cal-picker">
        <div class="cal-picker-row">
          <select id="cal-pick-year" onchange="applyCalPicker()"></select>
          <select id="cal-pick-month" onchange="applyCalPicker()"></select>
        </div>
      </div>
    </div>
    <button onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="day-log" id="day-log"></div>
</div>

<div class="pn" id="p-map">
  <div class="map-wrap">
    <div class="map-search">
      <div class="map-search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="map-input" placeholder="場所を検索..." autocomplete="off">
      </div>
      <button class="map-search-btn" id="map-search-btn" onclick="searchPlace()"><i class="fa-solid fa-magnifying-glass"></i></button>
      <div class="map-results" id="map-results"></div>
    </div>
    <div id="leaflet-map"></div>
    <div class="map-filter-chips" id="map-filter-chips"></div>
    <div class="map-legend">
      <span><span class="dot" style="background:var(--red)"></span> 行った</span>
      <span><span class="dot" style="background:var(--blue)"></span> 行きたい</span>
    </div>
    <div class="map-ctrl-btns">
      <button class="map-ctrl-btn" id="btn-heatmap" title="ヒートマップ">&#x1F525;</button>
      <button class="map-ctrl-btn" id="btn-route" title="ルート表示">&#x1F517;</button>
    </div>
  </div>
</div>

<div class="pn" id="p-stats"></div>

<div class="pn" id="p-settings">
  <div class="settings">
    <div class="set-section">
      <h3><i class="fa-solid fa-cloud"></i> Firebase接続</h3>
      <input class="set-input" id="fb-apikey" placeholder="apiKey">
      <input class="set-input" id="fb-dburl" placeholder="databaseURL（例: https://xxx.firebaseio.com）">
      <div class="set-btn-row">
        <button class="set-btn btn-connect" id="fb-connect-btn" onclick="fbConnect()"><i class="fa-solid fa-plug"></i> 接続</button>
        <button class="set-btn btn-disconnect" id="fb-disconnect-btn" onclick="fbDisconnect()" style="display:none"><i class="fa-solid fa-plug-circle-xmark"></i> 切断</button>
      </div>
      <p class="set-hint">&#x26A0;&#xFE0F; Firebaseコンソールでセキュリティルールを設定してください</p>
    </div>
    <div class="set-section">
      <h3><i class="fa-solid fa-key"></i> 共有キー（合言葉）</h3>
      <input class="set-input" id="fb-passphrase" placeholder="パートナーと同じ合言葉を入力">
      <button class="set-btn btn-connect" id="fb-share-btn" onclick="fbStartShare()"><i class="fa-solid fa-share-nodes"></i> 共有開始</button>
      <p class="set-hint">&#x1F4A1; 2人で同じ合言葉を入力すると、データがリアルタイム同期されます。</p>
    </div>
    <div class="set-section">
      <h3><i class="fa-solid fa-palette"></i> 表示設定</h3>
      <div class="set-row"><label>ダークモード</label><button class="toggle" id="dark-toggle" onclick="toggleDark()"></button></div>
    </div>
    <div class="set-section">
      <h3><i class="fa-solid fa-floppy-disk"></i> データ管理</h3>
      <button class="set-btn" onclick="exportData()"><i class="fa-solid fa-download"></i> エクスポート（JSON）</button>
      <button class="set-btn" onclick="triggerImport()"><i class="fa-solid fa-upload"></i> インポート</button>
      <button class="set-btn" style="color:var(--red);border-color:var(--red)" onclick="clearData()"><i class="fa-solid fa-trash"></i> 全データ削除</button>
    </div>
  </div>
</div>

<nav class="bn">
  <button class="nb on" data-t="p-calendar"><i class="fa-solid fa-calendar-days"></i><span>カレンダー</span></button>
  <button class="nb" data-t="p-map"><i class="fa-solid fa-map-location-dot"></i><span>地図</span></button>
  <button class="nb" data-t="p-stats"><i class="fa-solid fa-chart-pie"></i><span>統計</span></button>
  <button class="nb" data-t="p-settings"><i class="fa-solid fa-gear"></i><span>設定</span></button>
</nav>

<button class="fab" id="fab" onclick="openAddSheet()"><i class="fa-solid fa-plus"></i></button>

<div class="so" id="sheet" onclick="sheetBgClick(event)">
  <div class="sheet"><div class="shandle"></div><div id="shB"></div></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-import" accept=".json" style="display:none">

<script>
(function(){
  "use strict";

  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){});}

  // === Storage ===
  var LS={get:function(k){try{return localStorage.getItem(k);}catch(e){return null;}},set:function(k,v){try{localStorage.setItem(k,v);}catch(e){}},rm:function(k){try{localStorage.removeItem(k);}catch(e){}}};

  // === Data ===
  var KEY="fm_data";
  var SAMPLE={places:[{id:"p1",name:"\u4ee3\u3005\u6728\u516c\u5712",lat:35.6712,lng:139.6950,status:"visited",url:"",createdAt:"2025-07-05"},{id:"p2",name:"\u6771\u4eac\u30b9\u30ab\u30a4\u30c4\u30ea\u30fc",lat:35.7101,lng:139.8107,status:"visited",url:"",createdAt:"2025-07-12"},{id:"p3",name:"\u304a\u53f0\u5834\u6d77\u6d5c\u516c\u5712",lat:35.6295,lng:139.7753,status:"visited",url:"",createdAt:"2025-07-19"},{id:"p4",name:"\u938c\u5009 \u9db4\u5ca1\u516b\u5e61\u5bae",lat:35.3192,lng:139.5466,status:"wishlist",url:"",createdAt:"2025-07-01"},{id:"p5",name:"\u6a2a\u6d5c\u4e2d\u83ef\u8857",lat:35.4437,lng:139.6450,status:"wishlist",url:"",createdAt:"2025-07-03"}],visits:[{id:"v1",placeId:"p1",date:"2025-07-05",memo:"\u7dd1\u304c\u304d\u308c\u3044\u3060\u3063\u305f\uff01\u30d4\u30af\u30cb\u30c3\u30af\u6700\u9ad8",photos:[],weather:null,createdAt:"2025-07-05"},{id:"v2",placeId:"p2",date:"2025-07-12",memo:"\u5c55\u671b\u53f0\u304b\u3089\u306e\u591c\u666f\u304c\u7d20\u6674\u3089\u3057\u3044",photos:[],weather:null,createdAt:"2025-07-12"},{id:"v3",placeId:"p3",date:"2025-07-19",memo:"\u7802\u6d5c\u3067\u5915\u65e5\u3092\u898b\u305f\u3002\u98a8\u304c\u6c17\u6301\u3061\u3044\u3044",photos:[],weather:null,createdAt:"2025-07-19"},{id:"v4",placeId:"p1",date:"2025-07-26",memo:"2\u56de\u76ee\uff01\u4eca\u5ea6\u306f\u30d0\u30c9\u30df\u30f3\u30c8\u30f3\u3057\u305f",photos:[],weather:null,createdAt:"2025-07-26"}]};

  function loadData(){var raw=LS.get(KEY);if(raw){try{return JSON.parse(raw);}catch(e){}}LS.set(KEY,JSON.stringify(SAMPLE));return JSON.parse(JSON.stringify(SAMPLE));}
  function saveData(){LS.set(KEY,JSON.stringify(data));fbSync();}
  function saveDataLocal(){LS.set(KEY,JSON.stringify(data));}
  var data=loadData();

  // === Critical 1: Photo Base64 XSS Prevention ===
  function isSafePhotoSrc(src){
    if(!src || typeof src !== 'string') return false;
    return /^data:image\/(png|jpeg|webp|gif|jpg);base64,[A-Za-z0-9+\/=]+$/.test(src);
  }

  // === Critical 2: javascript: URL Block ===
  function isSafeUrl(url){
    if(!url) return false;
    var lower = url.toLowerCase().trim();
    return lower.indexOf('http://') === 0 || lower.indexOf('https://') === 0;
  }

  // === High 4: Photo Data Size Check ===
  function checkDataSize(){
    var totalSize = JSON.stringify(data).length;
    if(totalSize > 4 * 1024 * 1024){
      toast('\uD83D\uDCE6 \u30C7\u30FC\u30BF\u5BB9\u91CF\u304C\u5927\u304D\u304F\u306A\u3063\u3066\u3044\u307E\u3059\u3002\u53E4\u3044\u5199\u771F\u306E\u524A\u9664\u3092\u691C\u8A0E\u3057\u3066\u304F\u3060\u3055\u3044');
    }
  }

  // === Medium 9: Import Data Validation ===
  function validateImportData(imported){
    if(!imported || !Array.isArray(imported.places) || !Array.isArray(imported.visits)) return false;
    for(var i=0;i<imported.places.length;i++){
      var p = imported.places[i];
      if(!p.id || typeof p.lat !== 'number' || typeof p.lng !== 'number' || !p.name) return false;
    }
    return true;
  }

  // === Medium 10: Date N months ago (month-end overflow fix) ===
  function getDateNMonthsAgo(n){
    var d = new Date();
    var origDay = d.getDate();
    d.setMonth(d.getMonth() - n);
    if(d.getDate() !== origDay){
      d.setDate(0);
    }
    return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
  }

  // === Weather (manual selection) ===
  var WEATHER_OPTIONS=[
    {key:'', emoji:'', label:'選択しない'},
    {key:'sunny', emoji:'☀️', label:'晴れ'},
    {key:'cloudy', emoji:'☁️', label:'曇り'},
    {key:'partly_cloudy', emoji:'🌤️', label:'晴れ時々曇り'},
    {key:'rainy', emoji:'🌧️', label:'雨'},
    {key:'heavy_rain', emoji:'⛈️', label:'大雨・雷雨'},
    {key:'snowy', emoji:'❄️', label:'雪'},
    {key:'windy', emoji:'💨', label:'強風'},
    {key:'hot', emoji:'🥵', label:'猛暑'},
    {key:'cold', emoji:'🥶', label:'極寒'}
  ];
  var WEATHER_EMOJI_MAP={sunny:'☀️',cloudy:'☁️',partly_cloudy:'🌤️',rainy:'🌧️',heavy_rain:'⛈️',snowy:'❄️',windy:'💨',hot:'🥵',cold:'🥶'};
  // Backward compat: old numeric weathercodes from Open-Meteo
  var OLD_WEATHER_CODES=[{min:0,max:0,icon:'☀️'},{min:1,max:3,icon:'🌤️'},{min:45,max:48,icon:'🌫️'},{min:51,max:67,icon:'🌧️'},{min:71,max:77,icon:'❄️'},{min:80,max:82,icon:'🌦️'},{min:95,max:99,icon:'⛈️'}];
  function getWeatherIcon(w){
    if(w===null||w===undefined||w==='')return '';
    if(WEATHER_EMOJI_MAP[w])return WEATHER_EMOJI_MAP[w];
    // backward compat for old numeric codes
    if(typeof w==='number'){for(var i=0;i<OLD_WEATHER_CODES.length;i++){if(w>=OLD_WEATHER_CODES[i].min&&w<=OLD_WEATHER_CODES[i].max)return OLD_WEATHER_CODES[i].icon;}return '🌈';}
    return '';
  }
  function buildWeatherSelect(selected){
    var h='<div class="fg"><label>🌤️ 天気（任意）</label><select id="add-weather" style="font-size:16px;width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text)">';
    for(var i=0;i<WEATHER_OPTIONS.length;i++){var w=WEATHER_OPTIONS[i];h+='<option value="'+w.key+'"'+(selected===w.key?' selected':'')+'>'+w.emoji+(w.emoji?' ':'')+w.label+'</option>';}
    h+='</select></div>';return h;
  }

  // === Firebase ===
  var fbApp=null,fbDB=null,fbConnected=false,fbRoomId=null,fbSyncPaused=false;
  var fbDataRef=null,fbConnInfoRef=null;
  function sha256(str){var buf=new TextEncoder().encode(str);return crypto.subtle.digest('SHA-256',buf).then(function(hash){var arr=Array.from(new Uint8Array(hash));return arr.map(function(b){return b.toString(16).padStart(2,'0');}).join('');});}
  function updateBadge(connected){var badge=document.getElementById('sync-badge');if(connected){badge.textContent='\uD83D\uDFE2 \u540C\u671F\u4E2D';badge.className='badge connected';}else{badge.textContent='\u26AA \u672A\u63A5\u7D9A';badge.className='badge disconnected';}}
  function updateConnectionBadge(isConnected){if(isConnected)updateBadge(true);else if(fbConnected)updateBadge(false);}

  window.fbConnect=function(){var apiKey=document.getElementById('fb-apikey').value.trim();var dbUrl=document.getElementById('fb-dburl').value.trim();if(!apiKey||!dbUrl){toast('apiKey\u3068databaseURL\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044');return;}try{if(fbApp){try{fbApp.delete();}catch(e){}fbApp=null;fbDB=null;}fbApp=firebase.initializeApp({apiKey:apiKey,databaseURL:dbUrl});fbDB=firebase.database();fbConnected=true;LS.set('fm_fb_apikey',apiKey);LS.set('fm_fb_dburl',dbUrl);document.getElementById('fb-connect-btn').style.display='none';document.getElementById('fb-disconnect-btn').style.display='';toast('Firebase\u63A5\u7D9A\u5B8C\u4E86\uFF01');var pass=document.getElementById('fb-passphrase').value.trim();if(!pass){var savedPass=LS.get('fm_fb_pass');if(savedPass){document.getElementById('fb-passphrase').value=savedPass;pass=savedPass;}}if(pass)fbStartShareInternal(pass);else{updateBadge(true);}}catch(e){toast('\u63A5\u7D9A\u306B\u5931\u6557');fbConnected=false;updateBadge(false);}};
  window.fbDisconnect=function(){fbStopListening();if(fbApp){try{fbApp.delete();}catch(e){}fbApp=null;fbDB=null;}fbConnected=false;fbRoomId=null;LS.rm('fm_fb_apikey');LS.rm('fm_fb_dburl');LS.rm('fm_fb_pass');document.getElementById('fb-connect-btn').style.display='';document.getElementById('fb-disconnect-btn').style.display='none';updateBadge(false);toast('Firebase\u5207\u65AD');};
  window.fbStartShare=function(){var pass=document.getElementById('fb-passphrase').value.trim();if(!pass){toast('\u5408\u8A00\u8449\u3092\u5165\u529B');return;}if(!fbConnected||!fbDB){toast('\u5148\u306BFirebase\u306B\u63A5\u7D9A');return;}fbStartShareInternal(pass);};
  function fbStartShareInternal(pass){LS.set('fm_fb_pass',pass);sha256(pass).then(function(hash){fbRoomId=hash;fbStopListening();fbAutoReconnect();fbSync();toast('\u5171\u6709\u958B\u59CB\uFF01');}).catch(function(){toast('\u30CF\u30C3\u30B7\u30E5\u5931\u6557');});}
  function fbSync(){
    if(!fbConnected||!fbRoomId||!fbDB||fbSyncPaused) return;
    try{
      var updates = {};
      updates['/places'] = {};
      for(var i=0; i<data.places.length; i++){
        updates['/places/' + data.places[i].id] = data.places[i];
      }
      updates['/visits'] = {};
      for(var i=0; i<data.visits.length; i++){
        updates['/visits/' + data.visits[i].id] = data.visits[i];
      }
      updates['/updatedAt'] = Date.now();
      fbDB.ref(fbRoomId).update(updates);
    }catch(e){}
  }
  function fbListen(){
    if(!fbConnected||!fbRoomId||!fbDB) return;
    if(fbDataRef){ fbDataRef.off(); fbDataRef = null; }
    fbDataRef = fbDB.ref(fbRoomId);
    fbDataRef.on('value', function(snap){
      var val = snap.val();
      if(!val) return;
      var newPlaces = val.places ? Object.values(val.places) : [];
      var newVisits = val.visits ? Object.values(val.visits) : [];
      if(JSON.stringify(newPlaces) === JSON.stringify(data.places) &&
         JSON.stringify(newVisits) === JSON.stringify(data.visits)) return;
      fbSyncPaused = true;
      data.places=newPlaces;data.visits=newVisits;for(var _mi=0;_mi<data.places.length;_mi++){if(!data.places[_mi].category)data.places[_mi].category='other';else if(OLD_KEY_MAP&&OLD_KEY_MAP[data.places[_mi].category])data.places[_mi].category=OLD_KEY_MAP[data.places[_mi].category];}saveDataLocal();
      refreshUI();
      fbSyncPaused = false;
    });
  }
  function fbStopListening(){
    if(fbConnInfoRef){ fbConnInfoRef.off(); fbConnInfoRef = null; }
    if(fbDataRef){ fbDataRef.off(); fbDataRef = null; }
  }
  function fbAutoReconnect(){
    if(!fbDB||!fbRoomId) return;
    if(fbConnInfoRef){ fbConnInfoRef.off(); fbConnInfoRef = null; }
    fbConnInfoRef = fbDB.ref('.info/connected');
    fbConnInfoRef.on('value', function(snap){
      updateConnectionBadge(snap.val() === true);
    });
    fbListen();
  }
  document.addEventListener('visibilitychange',function(){if(!document.hidden)fbAutoReconnect();});
  window.addEventListener('pageshow',function(){fbAutoReconnect();});
  function fbRestoreSettings(){var apiKey=LS.get('fm_fb_apikey');var dbUrl=LS.get('fm_fb_dburl');var pass=LS.get('fm_fb_pass');if(apiKey)document.getElementById('fb-apikey').value=apiKey;if(dbUrl)document.getElementById('fb-dburl').value=dbUrl;if(pass)document.getElementById('fb-passphrase').value=pass;if(apiKey&&dbUrl)setTimeout(function(){fbConnect();},500);}

  // === Toast ===
  var toastTimer=null;
  window.toast=function(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove("show");},2000);};

  // === Sheet ===
  window.openS=function(html){document.body.style.overflow='hidden';document.getElementById("shB").innerHTML=html;document.getElementById("sheet").classList.add("open");};
  window.closeS=function(){document.body.style.overflow='';document.getElementById("sheet").classList.remove("open");};
  window.sheetBgClick=function(e){if(e.target===document.getElementById("sheet"))closeS();};

  // === Tabs ===
  var tabs=document.querySelectorAll(".nb");
  var panels=document.querySelectorAll(".pn");
  for(var i=0;i<tabs.length;i++){(function(btn){btn.addEventListener("click",function(){for(var j=0;j<tabs.length;j++)tabs[j].classList.remove("on");for(var j=0;j<panels.length;j++)panels[j].classList.remove("on");btn.classList.add("on");document.getElementById(btn.getAttribute("data-t")).classList.add("on");var fab=document.getElementById("fab");fab.style.display=(btn.getAttribute("data-t")==="p-settings"||btn.getAttribute("data-t")==="p-stats")?"none":"flex";if(btn.getAttribute("data-t")==="p-map")initMap();if(btn.getAttribute("data-t")==="p-stats")renderStats();});})(tabs[i]);}

  // === Calendar ===
  var calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
  window.changeMonth=function(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCalendar();};
  window.toggleCalPicker=function(){var picker=document.getElementById('cal-picker');if(picker.classList.contains('show')){picker.classList.remove('show');return;}var yearSel=document.getElementById('cal-pick-year');var monthSel=document.getElementById('cal-pick-month');var currentYear=new Date().getFullYear();var yHtml='';for(var y=currentYear-5;y<=currentYear+5;y++)yHtml+='<option value="'+y+'"'+(y===calYear?' selected':'')+'>'+y+'\u5E74</option>';yearSel.innerHTML=yHtml;var mHtml='';for(var m=0;m<12;m++)mHtml+='<option value="'+m+'"'+(m===calMonth?' selected':'')+'>'+((m+1))+'\u6708</option>';monthSel.innerHTML=mHtml;picker.classList.add('show');};
  window.applyCalPicker=function(){calYear=parseInt(document.getElementById('cal-pick-year').value,10);calMonth=parseInt(document.getElementById('cal-pick-month').value,10);renderCalendar();document.getElementById('cal-picker').classList.remove('show');};
  document.addEventListener('click',function(e){if(!e.target.closest('.cal-title-wrap')){var picker=document.getElementById('cal-picker');if(picker)picker.classList.remove('show');}});

  function renderCalendar(){
    document.getElementById("cal-title").textContent=calYear+"\u5E74"+(calMonth+1)+"\u6708";
    var grid=document.getElementById("cal-grid");var dows=["\u65E5","\u6708","\u706B","\u6C34","\u6728","\u91D1","\u571F"];var html="";for(var i=0;i<7;i++)html+='<div class="cal-dow">'+dows[i]+"</div>";

  // 重複除去: 緯度経度が近い(0.001度≒100m以内)
  function deduplicateResults(results){

  }

  var CATEGORY_MAP={};
  for(var _ci=0;_ci<CATEGORIES.length;_ci++){
    var _hue=Math.round((_ci/CATEGORIES.length)*360);
    CATEGORIES[_ci].color='hsl('+_hue+',65%,55%)';
    CATEGORY_MAP[CATEGORIES[_ci].key]=CATEGORIES[_ci];
  }

  // Old key migration
  var OLD_KEY_MAP={'restaurant':'gourmet','leisure':'themepark','nature':'park','park_nature':'park','temple':'shrine'};
  function migrateCategory(cat){return OLD_KEY_MAP[cat]||cat;}
  (function(){for(var i=0;i<data.places.length;i++){var p=data.places[i];if(!p.category){p.category='other';}else if(OLD_KEY_MAP[p.category]){p.category=OLD_KEY_MAP[p.category];}}saveDataLocal();})();

  function getCategoryEmoji(key){var c=CATEGORY_MAP[key];return c?c.emoji:'\uD83D\uDCCD';}
  function buildCategoryOptions(selected){var h='';for(var i=0;i<CATEGORIES.length;i++){var c=CATEGORIES[i];h+='<option value="'+c.key+'"'+(selected===c.key?' selected':'')+'>'+c.emoji+' '+c.label+'</option>';}return h;}

  // === Stats (修正3: 12ヶ月グラフ) ===

  function renderStats(){
    var container=document.getElementById('p-stats');if(!container)return;
    var visitedPlaces=[];for(var i=0;i<data.places.length;i++){if(data.places[i].status==='visited')visitedPlaces.push(data.places[i]);}
    if(data.visits.length===0&&visitedPlaces.length===0){container.innerHTML='<div class="stats-empty"><div style="font-size:48px;margin-bottom:12px">\uD83D\uDCCA</div><div>\u307E\u3060\u30C7\u30FC\u30BF\u304C\u3042\u308A\u307E\u305B\u3093<br>\u5834\u6240\u3092\u8A18\u9332\u3059\u308B\u3068\u7D71\u8A08\u304C\u8868\u793A\u3055\u308C\u307E\u3059</div></div>';return;}
    var html='';
    // Summary cards
    var photoCount=0;for(var i=0;i<data.visits.length;i++){if(data.visits[i].photos)photoCount+=data.visits[i].photos.length;}
    var dateSet={};for(var i=0;i<data.visits.length;i++)dateSet[data.visits[i].date]=true;var dayCount=Object.keys(dateSet).length;
    html+='<div class="stats-section"><div class="stats-summary">';
    html+='<div class="stats-card"><div class="sc-icon">\uD83D\uDCCD</div><div class="sc-value">'+visitedPlaces.length+'</div><div class="sc-label">\u8A2A\u554F\u5834\u6240</div></div>';
    html+='<div class="stats-card"><div class="sc-icon">\uD83D\uDCDD</div><div class="sc-value">'+data.visits.length+'</div><div class="sc-label">\u8A2A\u554F\u8A18\u9332</div></div>';
    html+='<div class="stats-card"><div class="sc-icon">\uD83D\uDCF7</div><div class="sc-value">'+photoCount+'</div><div class="sc-label">\u5199\u771F\u679A\u6570</div></div>';
    html+='<div class="stats-card"><div class="sc-icon">\uD83D\uDDD3\uFE0F</div><div class="sc-value">'+dayCount+'</div><div class="sc-label">\u8A18\u9332\u65E5\u6570</div></div>';
    html+='</div></div>';
    // Monthly bar chart - 修正3: 12ヶ月に変更
    var months=[];var now=new Date();for(var i=11;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2));}
    var mCounts={};for(var i=0;i<months.length;i++)mCounts[months[i]]=0;for(var i=0;i<data.visits.length;i++){var ym=data.visits[i].date.substring(0,7);if(mCounts.hasOwnProperty(ym))mCounts[ym]++;}
    var maxC=1;for(var i=0;i<months.length;i++){if(mCounts[months[i]]>maxC)maxC=mCounts[months[i]];}
    html+='<div class="stats-section"><div class="stats-section-title">\uD83D\uDCC8 \u6708\u5225\u8A2A\u554F\u56DE\u6570\uFF08\u76F4\u8FD112\u30F6\u6708\uFF09</div><div class="stats-bar-chart">';
    for(var i=0;i<months.length;i++){var c=mCounts[months[i]];var pct=Math.round((c/maxC)*100);var mLabel=parseInt(months[i].split('-')[1],10)+'\u6708';html+='<div class="stats-bar-row"><div class="stats-bar-label">'+mLabel+'</div><div class="stats-bar-track"><div class="stats-bar-fill" style="width:'+(c===0?0:Math.max(pct,8))+'%">'+(c>0?'<span class="stats-bar-count">'+c+'\u56DE</span>':'')+'</div></div></div>';}
    html+='</div></div>';
    // Category pie
    var catCounts={};for(var i=0;i<data.places.length;i++){if(data.places[i].status!=='visited')continue;var cat=data.places[i].category||'other';catCounts[cat]=(catCounts[cat]||0)+1;}
    var entries=[];for(var k in catCounts){if(catCounts.hasOwnProperty(k))entries.push({key:k,count:catCounts[k]});}entries.sort(function(a,b){return b.count-a.count;});
    var total=0;for(var i=0;i<entries.length;i++)total+=entries[i].count;
    if(total>0){var gradParts=[],cumDeg=0,legendH='';for(var i=0;i<entries.length;i++){var ci=CATEGORY_MAP[entries[i].key]||CATEGORY_MAP['other'];var deg=(entries[i].count/total)*360;gradParts.push(ci.color+' '+cumDeg.toFixed(1)+'deg '+(cumDeg+deg).toFixed(1)+'deg');cumDeg+=deg;legendH+='<div class="stats-legend-item"><div class="stats-legend-dot" style="background:'+ci.color+'"></div><span>'+ci.emoji+' '+ci.label+' '+entries[i].count+'</span></div>';}
    html+='<div class="stats-section"><div class="stats-section-title">\uD83C\uDFF7\uFE0F \u30AB\u30C6\u30B4\u30EA\u5225</div><div class="stats-pie-wrap"><div class="stats-pie" style="background:conic-gradient('+gradParts.join(',')+')"><div class="stats-pie-hole">'+total+'\u4EF6</div></div><div class="stats-legend">'+legendH+'</div></div></div>';}
    // TOP5
    var rated=[];for(var i=0;i<data.places.length;i++){if(data.places[i].rating&&data.places[i].rating>0)rated.push(data.places[i]);}rated.sort(function(a,b){return(b.rating||0)-(a.rating||0);});
    if(rated.length>0){html+='<div class="stats-section"><div class="stats-section-title">\u2B50 \u304A\u6C17\u306B\u5165\u308ATOP5</div><div class="stats-fav-list">';for(var i=0;i<Math.min(5,rated.length);i++){var p=rated[i];var stars='';for(var s=0;s<p.rating;s++)stars+='\u2605';for(var s2=p.rating;s2<5;s2++)stars+='\u2606';html+='<div class="stats-fav-item"><div class="stats-fav-rank">'+(i+1)+'</div><div class="stats-fav-info"><div class="stats-fav-name">'+escapeHtml(p.name)+'</div><div class="stats-fav-meta"><span class="stats-fav-stars">'+stars+'</span></div></div></div>';}html+='</div></div>';}
    else{html+='<div class="stats-section"><div class="stats-section-title">\u2B50 \u304A\u6C17\u306B\u5165\u308ATOP5</div><div class="stats-empty" style="padding:16px 0">\u2605\u8A55\u4FA1\u3092\u3064\u3051\u308B\u3068\u8868\u793A\u3055\u308C\u307E\u3059</div></div>';}
    // Monthly cost
    var thisMonth=now.getFullYear()+'-'+('0'+(now.getMonth()+1)).slice(-2);var costTotal=0,costItems=[];
    for(var i=0;i<data.visits.length;i++){var v=data.visits[i];if(v.date&&v.date.substring(0,7)===thisMonth&&v.cost){costTotal+=v.cost;var pl=findPlace(v.placeId);costItems.push({name:pl?pl.name:'?',cost:v.cost});}}
    if(costTotal>0){html+='<div class="stats-section"><div class="stats-section-title">\uD83D\uDCB0 \u4ECA\u6708\u306E\u8CBB\u7528</div><div class="stats-cost-total">\u00A5'+costTotal.toLocaleString()+'</div>';for(var i=0;i<costItems.length;i++)html+='<div class="stats-cost-row"><span>'+escapeHtml(costItems[i].name)+'</span><span>\u00A5'+costItems[i].cost.toLocaleString()+'</span></div>';html+='</div>';}
    container.innerHTML=html;
  }

  // === Memory Notification ===
  function checkMemoryNotification(){
    var todayKey='fm_memory_'+new Date().toISOString().slice(0,10);
    if(sessionStorage.getItem(todayKey))return;
    // Medium 10: Use getDateNMonthsAgo to avoid month-end overflow
    var targets=[{label:'1\u5E74\u524D\u306E\u4ECA\u65E5',ds:getDateNMonthsAgo(12)},{label:'\u534A\u5E74\u524D\u306E\u4ECA\u65E5',ds:getDateNMonthsAgo(6)},{label:'1\u30F6\u6708\u524D\u306E\u4ECA\u65E5',ds:getDateNMonthsAgo(1)}];
    var found=null;
    for(var t=0;t<targets.length&&!found;t++){var tgt=targets[t];var ds=tgt.ds;for(var v=0;v<data.visits.length;v++){if(data.visits[v].date===ds){var pl=findPlace(data.visits[v].placeId);found={label:tgt.label,place:pl?pl.name:'\u3069\u3053\u304B',visit:data.visits[v]};break;}}}
    if(!found)return;
    var container=document.getElementById('memory-banner-container');if(!container)return;
    var banner=document.createElement('div');banner.className='memory-banner';
    banner.innerHTML='<span class="memory-banner-text">\uD83C\uDF89 '+escapeHtml(found.label)+'\u3001'+escapeHtml(found.place)+'\u306B\u884C\u304D\u307E\u3057\u305F\uFF01</span><button class="memory-banner-close">\u00D7</button>';
    banner.querySelector('.memory-banner-close').addEventListener('click',function(){banner.classList.add('memory-banner-hide');sessionStorage.setItem(todayKey,'1');setTimeout(function(){if(banner.parentNode)banner.parentNode.removeChild(banner);},300);});
    container.appendChild(banner);
  }

  // === Init ===
  if(LS.get("fm_dark")==="1"){document.body.classList.add("dark");document.getElementById("dark-toggle").classList.add("on");}
  renderCalendar();
  fbRestoreSettings();
  setTimeout(checkMemoryNotification,800);
})();
</script>
</body>
</html>
